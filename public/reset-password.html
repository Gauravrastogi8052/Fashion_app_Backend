<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #fff;
            width: 350px;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #aaa;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .msg {
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Reset Password</h2>

    <input id="password" type="password" placeholder="New Password" />
    <input id="confirmPassword" type="password" placeholder="Confirm Password" />

    <button onclick="resetPassword()">Update Password</button>

    <p class="msg" id="response"></p>
</div>


<script>
    async function resetPassword() {
        const password = document.getElementById("password").value;
        const confirmPassword = document.getElementById("confirmPassword").value;

        const responseText = document.getElementById("response");

        if (password !== confirmPassword) {
            responseText.textContent = "⚠️ Passwords do not match!";
            responseText.style.color = "red";
            return;
        }

        // URL se token nikalna
        const params = new URLSearchParams(window.location.search);
        const token = params.get("token");

        if (!token) {
            responseText.textContent = "❌ Invalid or missing token!";
            responseText.style.color = "red";
            return;
        }

        try {
            const res = await fetch("http://10.215.53.145:5000/auth/reset-password", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
               body: JSON.stringify({ token, newPassword: password })

            });

            const data = await res.json();
            
            if (res.ok) {
                responseText.textContent = "✅ Password updated successfully!";
                responseText.style.color = "green";
            } else {
                responseText.textContent = "❌ " + data.message;
                responseText.style.color = "red";
            }
        } catch (err) {
            responseText.textContent = "❌ Server not connected!";
            responseText.style.color = "red";
        }
    }
</script>

</body>
</html>
