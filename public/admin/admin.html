<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="flex min-h-screen">

  <!-- Sidebar -->
  <aside class="w-64 bg-gradient-to-b from-indigo-700 to-purple-700 text-white hidden md:block">
    <div class="text-center py-6 text-2xl font-bold border-b border-white/30">
      🛒 Admin Panel
    </div>
    <nav class="mt-6 space-y-2 px-4">
      <a href="products.html" class="block px-4 py-2 rounded hover:bg-white/20">📦 Products</a>
      <a href="#" class="block px-4 py-2 rounded hover:bg-white/20">🧾 Orders</a>
      <a href="#" class="block px-4 py-2 rounded hover:bg-white/20">💳 Payments</a>
      <a href="#" class="block px-4 py-2 rounded hover:bg-white/20">👤 Users</a>
      <a href="admin-login.html" class="block px-4 py-2 rounded bg-red-500 hover:bg-red-600 mt-6">🚪 Logout</a>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 p-6">

    <!-- Header -->
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-3xl font-bold">Dashboard</h1>
      <span class="bg-green-100 text-green-700 px-4 py-1 rounded-full text-sm">
        Admin Online
      </span>
    </div>

    <!-- Stats Cards -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">

      <div class="bg-white shadow rounded p-4 text-center">
        <p class="text-gray-500">Products</p>
        <h2 class="text-2xl font-bold">120</h2>
      </div>

      <div class="bg-white shadow rounded p-4 text-center">
        <p class="text-gray-500">Orders</p>
        <h2 class="text-2xl font-bold">45</h2>
      </div>

      <div class="bg-white shadow rounded p-4 text-center">
        <p class="text-gray-500">Users</p>
        <h2 class="text-2xl font-bold">89</h2>
      </div>

      <div class="bg-white shadow rounded p-4 text-center">
        <p class="text-gray-500">Revenue</p>
        <h2 class="text-2xl font-bold">₹24,500</h2>
      </div>

    </div>

    <!-- Table -->
    <div class="bg-white shadow rounded p-4">
      <h2 class="text-xl font-semibold mb-4">Recent Orders</h2>
      <div class="overflow-x-auto">
        <table class="w-full border">
          <thead class="bg-gray-800 text-white">
            <tr>
              <th class="border px-3 py-2">Order ID</th>
              <th class="border px-3 py-2">User</th>
              <th class="border px-3 py-2">Amount</th>
              <th class="border px-3 py-2">Status</th>
            </tr>
          </thead>
          <tbody>
            <tr class="text-center">
              <td class="border px-3 py-2">101</td>
              <td class="border px-3 py-2">Rahul</td>
              <td class="border px-3 py-2">₹999</td>
              <td class="border px-3 py-2 text-green-600">Paid</td>
            </tr>
            <tr class="text-center">
              <td class="border px-3 py-2">102</td>
              <td class="border px-3 py-2">Aman</td>
              <td class="border px-3 py-2">₹1499</td>
              <td class="border px-3 py-2 text-yellow-600">Pending</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>
</div>

</body>
</html>
