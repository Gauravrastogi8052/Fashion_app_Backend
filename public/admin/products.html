<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Products - Admin Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #1e293b;
    }

    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      height: 100vh;
      z-index: 50;
      background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
      box-shadow: 4px 0 20px rgba(0, 0, 0, 0.3);
      width: 264px;
    }

    .main-content {
      margin-left: 264px;
    }

    .form-input {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid #e2e8f0;
      border-radius: 8px;
    }

    .form-input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
      transform: none;
    }

    .table-row {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border-bottom: 1px solid #e2e8f0;
    }

    .table-row:hover {
      background-color: #f8fafc;
      box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.05);
    }

    .btn-upload {
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 8px;
      border: none;
    }

    .btn-upload:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4);
    }

    .preview-box {
      border: 2px dashed #3b82f6;
      border-radius: 10px;
      background: #f0f9ff;
    }

    .bg-white {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.07);
    }

    .preview-box img {
      border-radius: 8px;
    }

    @media (max-width: 768px) {
      .sidebar {
        left: -264px;
        transition: left 0.3s ease;
      }

      .sidebar.active {
        left: 0;
      }

      .main-content {
        margin-left: 0;
      }
    }
  </style>
</head>

<body>

<div class="flex min-h-screen">

  <!-- Sidebar -->
  <aside class="sidebar w-64 bg-gradient-to-b from-indigo-700 to-purple-800 text-white">
    <div class="text-center py-8 border-b border-white/30">
      <div class="text-4xl mb-2">🎯</div>
      <h1 class="text-2xl font-bold">Admin Hub</h1>
      <p class="text-xs text-white/60 mt-1">eCommerce Manager</p>
    </div>

    <nav class="mt-8 px-4 space-y-1">
      <a href="admin.html" class="block px-4 py-3 rounded-lg text-white/90 hover:text-white hover:bg-white/10">
        <i class="fas fa-chart-line mr-3"></i>Dashboard
      </a>
      <a href="products.html" class="block px-4 py-3 rounded-lg text-white bg-white/20 border-r-4 border-white">
        <i class="fas fa-box mr-3"></i>Products
      </a>
      <a href="orders.html" class="block px-4 py-3 rounded-lg text-white/90 hover:text-white hover:bg-white/10">
        <i class="fas fa-shopping-cart mr-3"></i>Orders
      </a>
      <a href="reports.html" class="block px-4 py-3 rounded-lg text-white/90 hover:text-white hover:bg-white/10">
        <i class="fas fa-file-pdf mr-3"></i>Reports
      </a>
      <a href="users.html" class="block px-4 py-3 rounded-lg text-white/90 hover:text-white hover:bg-white/10">
        <i class="fas fa-users mr-3"></i>Users
      </a>
    </nav>

    <div class="px-4 mt-12 pt-6 border-t border-white/30">
      <a href="admin-login.html" class="block px-4 py-3 rounded-lg bg-red-500/80 hover:bg-red-600 transition text-center font-semibold">
        <i class="fas fa-sign-out-alt mr-2"></i>Logout
      </a>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content flex-1 p-4 md:p-8 overflow-auto">

    <!-- Header -->
    <div class="flex justify-between items-center mb-8">
      <div>
        <h1 class="text-4xl font-bold text-white mb-1">📦 Products</h1>
        <p class="text-white/70">Manage your store inventory</p>
      </div>
      <button class="md:hidden text-white text-2xl" onclick="toggleSidebar()" title="Toggle sidebar menu">
        <i class="fas fa-bars"></i>
      </button>
    </div>

    <!-- Add Product Form -->
    <div class="bg-white rounded-2xl shadow-lg p-6 md:p-8 mb-8">
      <h2 class="text-2xl font-bold text-gray-900 mb-6">
        <i class="fas fa-plus-circle mr-3 text-indigo-600"></i>Add New Product
      </h2>

      <form id="productForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <div>
          <label class="block mb-2 font-semibold text-gray-700">
            <i class="fas fa-box mr-2"></i>Product Name
          </label>
          <input 
            id="name" 
            type="text"
            class="form-input w-full border-2 border-gray-300 rounded-lg px-4 py-3 focus:border-indigo-600 focus:outline-none" 
            placeholder="Enter product name"
            required>
        </div>

        <div>
          <label class="block mb-2 font-semibold text-gray-700">
            <i class="fas fa-rupee-sign mr-2"></i>Price (₹)
          </label>
          <input 
            id="price" 
            type="number" 
            step="0.01"
            class="form-input w-full border-2 border-gray-300 rounded-lg px-4 py-3 focus:border-indigo-600 focus:outline-none" 
            placeholder="Enter price"
            required>
        </div>

        <div>
          <label class="block mb-2 font-semibold text-gray-700">
            <i class="fas fa-tags mr-2"></i>Category
          </label>
          <select 
            id="category" 
            class="form-input w-full border-2 border-gray-300 rounded-lg px-4 py-3 focus:border-indigo-600 focus:outline-none">
            <option value="">Select Category</option>
            <option value="men">👔 Men</option>
            <option value="women">👗 Women</option>
            <option value="kids">👶 Kids</option>
          </select>
        </div>

        <div>
          <label class="block mb-2 font-semibold text-gray-700">
            <i class="fas fa-image mr-2"></i>Product Image
          </label>
          <input 
            type="file" 
            id="image" 
            accept="image/*"
            class="form-input w-full border-2 border-gray-300 rounded-lg px-4 py-3 focus:border-indigo-600 focus:outline-none"
            required>
        </div>

        <div class="preview-box flex items-center justify-center h-32">
          <img id="preview" class="max-h-full max-w-full object-contain" />
          <span id="previewText" class="text-gray-400 text-sm">Image preview will appear here</span>
        </div>

        <div class="md:col-span-2">
          <button 
            type="submit"
            class="btn-upload w-full text-white py-3 rounded-lg font-semibold flex items-center justify-center space-x-2">
            <i class="fas fa-cloud-upload-alt"></i>
            <span id="btnText">Upload Product</span>
          </button>
        </div>
      </form>
    </div>

    <!-- Products Table -->
    <div class="bg-white rounded-2xl shadow-lg p-6 md:p-8">
      <h2 class="text-2xl font-bold text-gray-900 mb-6">
        <i class="fas fa-list mr-3 text-indigo-600"></i>All Products (<span id="productCount">0</span>)
      </h2>

      <div class="overflow-x-auto">
        <table class="w-full">
          <thead>
            <tr class="border-b-2 border-gray-200">
              <th class="text-left px-4 py-4 font-semibold text-gray-600">ID</th>
              <th class="text-left px-4 py-4 font-semibold text-gray-600">Image</th>
              <th class="text-left px-4 py-4 font-semibold text-gray-600">Name</th>
              <th class="text-left px-4 py-4 font-semibold text-gray-600">Price</th>
              <th class="text-left px-4 py-4 font-semibold text-gray-600">Category</th>
              <th class="text-left px-4 py-4 font-semibold text-gray-600">Actions</th>
            </tr>
          </thead>
          <tbody id="productTable">
            <tr>
              <td colspan="6" class="text-center py-8 text-gray-500">
                <i class="fas fa-spinner fa-spin mr-2"></i>Loading products...
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>

</div>

<script>
  function toggleSidebar() {
    const sidebar = document.querySelector('.sidebar');
    sidebar.classList.toggle('active');
  }

  // Close sidebar when clicking nav links on mobile
  document.querySelectorAll('.sidebar a').forEach(link => {
    link.addEventListener('click', () => {
      if (window.innerWidth < 768) {
        toggleSidebar();
      }
    });
  });
</script>

<script src="admin.js"></script>

</body>
</html>
