<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin - Orders</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="flex min-h-screen">

  <!-- Sidebar -->
  <aside class="w-64 bg-gradient-to-b from-indigo-700 to-purple-700 text-white hidden md:block">
    <div class="text-center py-6 text-2xl font-bold border-b border-white/30">
      🛒 Admin Panel
    </div>
    <nav class="mt-6 space-y-2 px-4">
      <a href="admin.html" class="block px-4 py-2 rounded hover:bg-white/20">📊 Dashboard</a>
      <a href="products.html" class="block px-4 py-2 rounded hover:bg-white/20">📦 Products</a>
      <a href="orders.html" class="block px-4 py-2 rounded bg-white/20">🧾 Orders</a>
      <a href="users.html" class="block px-4 py-2 rounded hover:bg-white/20">👤 Users</a>
      <a href="admin-login.html" class="block px-4 py-2 rounded bg-red-500 hover:bg-red-600 mt-6">🚪 Logout</a>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 p-6">

    <!-- Header -->
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-3xl font-bold">Orders</h1>
      <span class="bg-green-100 text-green-700 px-4 py-1 rounded-full text-sm">
        Order Management
      </span>
    </div>

    <!-- Orders Table -->
    <div class="bg-white shadow rounded p-4">
      <h2 class="text-xl font-semibold mb-4">All Orders</h2>

      <div class="overflow-x-auto">
        <table class="w-full border">
          <thead class="bg-gray-800 text-white">
            <tr>
              <th class="border px-3 py-2">Order ID</th>
              <th class="border px-3 py-2">User</th>
              <th class="border px-3 py-2">Total</th>
              <th class="border px-3 py-2">Status</th>
              <th class="border px-3 py-2">Payment</th>
              <th class="border px-3 py-2">Date</th>
              <th class="border px-3 py-2">Action</th>
            </tr>
          </thead>

          <tbody id="ordersTable" class="text-center">
            <!-- Orders from backend -->
          </tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<script>
const BASE_URL = "http://localhost:5000";

async function loadOrders() {
  const res = await fetch(`${BASE_URL}/orders`);
  const orders = await res.json();

  const table = document.getElementById("ordersTable");
  table.innerHTML = "";

  orders.forEach(o => {
    table.innerHTML += `
      <tr>
        <td class="border px-3 py-2">${o.id}</td>
        <td class="border px-3 py-2">${o.user?.name || o.userId}</td>
        <td class="border px-3 py-2">₹${o.totalAmount}</td>
        <td class="border px-3 py-2 
          ${o.status === "paid" ? "text-green-600" : "text-yellow-600"}">
          ${o.status}
        </td>
        <td class="border px-3 py-2">
          ${o.paymentStatus || "pending"}
        </td>
        <td class="border px-3 py-2">
          ${new Date(o.createdAt).toLocaleDateString()}
        </td>
        <td class="border px-3 py-2">
          <select onchange="updateStatus(${o.id}, this.value)" 
            class="border rounded px-2 py-1">
            <option value="">Change</option>
            <option value="pending">Pending</option>
            <option value="shipped">Shipped</option>
            <option value="delivered">Delivered</option>
          </select>
        </td>
      </tr>
    `;
  });
}

async function updateStatus(orderId, status) {
  if (!status) return;

  await fetch(`${BASE_URL}/orders/status`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ orderId, status })
  });

  alert("Order status updated ✅");
  loadOrders();
}

loadOrders();
</script>

</body>
</html>
