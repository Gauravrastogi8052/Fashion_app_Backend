<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-600 via-indigo-600 to-purple-700">

  <!-- Card -->
  <div class="bg-white/20 backdrop-blur-lg shadow-2xl rounded-2xl p-8 w-[90%] max-w-md border border-white/30">

    <!-- Logo / Title -->
    <div class="text-center mb-6">
      <div class="text-4xl mb-2">🛒</div>
      <h2 class="text-3xl font-bold text-white">Admin Login</h2>
      <p class="text-gray-200 text-sm">Welcome back, please login</p>
    </div>

    <form id="loginForm" class="space-y-4">

      <!-- Email -->
      <div>
        <label class="block text-white mb-1">Email</label>
        <input 
          type="email" 
          id="email"
          required
          placeholder="admin@gmail.com"
          class="w-full px-4 py-2 rounded-lg bg-white/90 focus:outline-none focus:ring-2 focus:ring-blue-400"
        >
      </div>

      <!-- Password -->
      <div>
        <label class="block text-white mb-1">Password</label>
        <input 
          type="password" 
          id="password"
          required
          placeholder="********"
          class="w-full px-4 py-2 rounded-lg bg-white/90 focus:outline-none focus:ring-2 focus:ring-blue-400"
        >
      </div>

      <!-- Button -->
      <button 
        type="submit"
        class="w-full bg-gradient-to-r from-blue-500 to-indigo-600 hover:scale-105 transition transform text-white py-2 rounded-lg font-semibold shadow-lg"
      >
        Login
      </button>

    </form>

    <!-- Error -->
    <p id="errorMsg" class="text-red-300 text-center mt-4"></p>

    <!-- Footer -->
    <p class="text-center text-gray-200 text-sm mt-6">
      © 2026 Admin Panel
    </p>
  </div>

<script>
const form = document.getElementById("loginForm");
const errorMsg = document.getElementById("errorMsg");

form.addEventListener("submit", (e) => {
  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  // Dummy login (abhi)
  if (email === "admin@gmail.com" && password === "123456") {
    window.location.href = "admin.html";
  } else {
    errorMsg.textContent = "❌ Invalid email or password";
  }
});
</script>

</body>
</html>
